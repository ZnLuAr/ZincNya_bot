[pytest]
# 测试发现规则
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 测试目录
testpaths = tests

# asyncio 模式（pytest-asyncio）
asyncio_mode = auto

# 输出配置
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --color=yes
    # 覆盖率报告（需要 pytest-cov）
    # 注意：覆盖率默认已禁用以加快本地开发速度（避免 30-50% 性能开销）
    # 如需启用覆盖率，运行: pytest --cov=utils --cov=handlers --cov=config --cov=loader --cov=modulesRegistry --cov-report=term-missing --cov-report=html:htmlcov

# Marker 定义
markers =
    slow: 慢速测试（>1s）
    integration: 集成测试
    network: 需要网络访问的测试
    unit: 单元测试（默认）

# Warning 过滤
filterwarnings =
    # 忽略第三方库的已知弃用警告
    ignore::DeprecationWarning:telegram
    ignore::DeprecationWarning:httpx
    ignore::PendingDeprecationWarning:aiohttp
    # 忽略 coverage 的模块导入警告
    ignore::coverage.exceptions.CoverageWarning
    # 如果项目代码出现 DeprecationWarning，应该显示出来以便修复